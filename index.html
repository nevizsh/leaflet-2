<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>TP2 — Bornes de recharge NC</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

        <link rel="stylesheet" href="css/styles.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    </head>
    <body>
        <header>
            <div>
              <h1>Bornes de recharge électrique</h1>
              <p>Nouvelle-Calédonie</p>
            </div>
        </header>

        <div class="toolbar">
            <input
              type="text"
              id="search-input"
              placeholder="Rechercher par ville, nom, opérateur…"
              aria-label="Recherche de borne"
            />
            <button id="btn-itineraire">Borne la plus proche</button>
            <button id="btn-reset">Réinitialiser</button>
        </div>

        <div id="result-count">Chargement des bornes…</div>

        <div class="app-container">
            <div id="map"></div>

            <aside id="side-panel" role="complementary" aria-label="Informations de la borne">
            <div class="panel-header">
                <h2>Détails de la borne</h2>
                <button id="btn-close-panel" aria-label="Fermer le panneau">✕</button>
            </div>
            <div id="panel-content"></div>
            </aside>
        </div>

        <!-- jQuery -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
